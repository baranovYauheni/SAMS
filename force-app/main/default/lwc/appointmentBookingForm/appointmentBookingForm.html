<template>
    <lightning-card title="Book Appointment" icon-name="custom:custom15">
        <div class="slds-p-around_medium">
            <lightning-record-edit-form object-api-name={appointmentObject} onsuccess={handleSuccess}>
                <lightning-messages></lightning-messages>

                <div class="slds-grid slds-wrap slds-gutters">

                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                        <template if:true={isContactRecord}>
                            <lightning-input-field field-name={fields.customer} value={recordId}
                                disabled></lightning-input-field>
                        </template>
                    </div>

                    <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                        <lightning-input-field field-name={fields.agent} required></lightning-input-field>
                    </div>

                    <div class="slds-col slds-size_1-of-1 slds-p-top_small">
                        <lightning-input-field field-name={fields.date} required></lightning-input-field>
                    </div>

                    <div class="slds-col slds-size_1-of-1 slds-p-top_small">
                        <lightning-input-field field-name={fields.status}></lightning-input-field>
                    </div>

                    <div class="slds-col slds-size_1-of-1 slds-p-top_small">
                        <lightning-input-field field-name={fields.description}></lightning-input-field>
                    </div>
                </div>

                <div class="slds-m-top_medium slds-text-align_center">
                    <lightning-button variant="brand" type="submit" label="Book Appointment"></lightning-button>
                </div>
            </lightning-record-edit-form>
        </div>
    </lightning-card>
</template>
